<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tok Lal Production</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>

    <!-- ========================================== -->
    <!-- BANNER                                    -->
    <!-- ========================================== -->

    <header class="site-header">
        <img src="pictures/banner.png" alt="TOK LAL Production Banner">
    </header>

    <!-- ========================================== -->
    <!-- MAIN GATE                                 -->
    <!-- ========================================== -->

    <div class="gate-container">

        <div class="gate-content">

            <!-- Logo -->
            <div class="gate-logo">
                <img src="pictures/logo/toklal-logo.png" alt="Tok Lal Production" onerror="this.style.display='none'">
            </div>

            <!-- Welcome -->
            <div class="gate-welcome">
                <h2>SELAMAT DATANG</h2>
                <p class="subtitle">Sila pilih peranan anda</p>
            </div>

            <!-- Options -->
            <div class="gate-options">

                <!-- VISITOR -->
                <a href="visitor.html" class="gate-card visitor-card">
                    <div class="visitor-left">
                        <div class="card-icon">👥</div>
                        <div class="card-content">
                            <h3>PELAWAT</h3>
                            <p class="card-sub">Visitor</p>
                            <p class="card-desc">Lihat portfolio, kelas & aktiviti kami</p>
                            <span class="card-btn">🚪 Masuk Sebagai Pelawat</span>
                        </div>
                    </div>
                    <div class="visitor-right">
                        <img src="pictures/gate/visitor-preview.jpg" alt="Tok Lal Production" onerror="this.style.display='none'">
                    </div>
                </a>

                <!-- USER + ADMIN ROW -->
                <div class="gate-row">

                    <a href="user-login.html" class="gate-card user-card">
                        <div class="card-icon">👤</div>
                        <div class="card-content">
                            <h4>GURU &amp; PELAJAR</h4>
                            <p class="card-sub">Teacher &amp; Student</p>
                            <span class="card-btn-small">🔵 Log Masuk</span>
                        </div>
                    </a>

                    <a href="admin-login.html" class="gate-card admin-card">
                        <div class="card-icon">🔐</div>
                        <div class="card-content">
                            <h4>ADMIN</h4>
                            <p class="card-sub">Pentadbir</p>
                            <span class="card-btn-small">Log Masuk →</span>
                        </div>
                    </a>

                </div>

            </div>

            <!-- Footer -->
            <div class="gate-footer">
                <p>© 2025 Tok Lal Production. All Rights Reserved.</p>
            </div>

        </div>

    </div>

    <script>
        console.log('%c🎵 TOK LAL PRODUCTION', 'font-size: 28px; font-weight: 900; color: #4D13D1;');
        console.log('%c"Melestarikan Warisan, Memodenkan Muzik"', 'font-size: 14px; color: #C4C0B8;');
        console.log('%cProfesional • Interaktif • Modern', 'font-size: 13px; color: #FFB830;');
    </script>

</body>
</html>
