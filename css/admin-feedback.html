<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tok Lal Production - Admin Feedback</title>

    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        .admin-page {
            min-height: 100vh;
            background: #0a0a1a;
            padding: 20px;
        }

        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-bottom: 30px;
        }

        .admin-header .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .admin-header .logo-area img {
            height: 40px;
            width: auto;
        }

        .admin-header .logo-area span {
            color: #d4a843;
            font-size: 1.2rem;
            font-weight: 600;
        }

        .admin-header .user-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .admin-header .user-area .admin-name {
            color: #c0c0d0;
            font-size: 0.9rem;
        }

        .admin-header .user-area .logout-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #e74c3c;
            border: 1px solid rgba(231, 76, 60, 0.2);
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .admin-header .user-area .logout-btn:hover {
            background: rgba(231, 76, 60, 0.15);
        }

        .page-title h1 {
            color: #d4a843;
            font-size: 1.8rem;
            margin-bottom: 25px;
        }

        .back-link {
            display: inline-block;
            color: #8888a0;
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 20px;
            transition: color 0.3s;
        }

        .back-link:hover {
            color: #d4a843;
        }

        .feedback-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 25px;
        }

        .feedback-stat {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 10px;
            padding: 15px 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .feedback-stat .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #d4a843;
        }

        .feedback-stat .stat-label {
            color: #8888a0;
            font-size: 0.8rem;
        }

        .feedback-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .feedback-item {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            padding: 20px 25px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            transition: all 0.3s;
        }

        .feedback-item:hover {
            border-color: rgba(212, 168, 67, 0.2);
        }

        .feedback-item .feedback-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .feedback-item .feedback-author {
            color: #e8e8f0;
            font-weight: 600;
        }

        .feedback-item .feedback-rating {
            color: #d4a843;
        }

        .feedback-item .feedback-date {
            color: #555570;
            font-size: 0.8rem;
        }

        .feedback-item .feedback-text {
            color: #c0c0d0;
            font-size: 0.95rem;
            margin: 5px 0 10px 0;
        }

        .feedback-item .feedback-target {
            color: #8888a0;
            font-size: 0.85rem;
        }

        .feedback-item .feedback-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .feedback-item .action-btn {
            background: rgba(255, 255, 255, 0.06);
            color: #c0c0d0;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 5px 16px;
            border-radius: 6px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
        }

        .feedback-item .action-btn:hover {
            background: rgba(212, 168, 67, 0.15);
            border-color: rgba(212, 168, 67, 0.3);
            color: #d4a843;
        }

        .feedback-item .action-btn.delete:hover {
            background: rgba(231, 76, 60, 0.15);
            border-color: rgba(231, 76, 60, 0.3);
            color: #e74c3c;
        }

        .empty-state {
            text-align: center;
            color: #555570;
            padding: 60px 20px;
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        @media screen and (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
            }

            .feedback-item .feedback-header {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
        }
    </style>
</head>

<body>

    <div class="admin-page">

        <div class="admin-container">

            <header class="admin-header">
                <div class="logo-area">
                    <img src="pictures/logo/toklal-logo.png" alt="Tok Lal Production" onerror="this.style.display='none'">
                    <span>Admin Panel</span>
                </div>
                <div class="user-area">
                    <span class="admin-name">👤 Admin</span>
                    <a href="admin-login.html" class="logout-btn">🚪 Log Keluar</a>
                </div>
            </header>

            <a href="admin-dashboard.html" class="back-link">← Kembali ke Dashboard</a>

            <div class="page-title">
                <h1>⭐ Ulasan & Maklum Balas</h1>
            </div>

            <div class="feedback-stats">
                <div class="feedback-stat">
                    <div class="stat-number">0</div>
                    <div class="stat-label">Jumlah Ulasan</div>
                </div>
                <div class="feedback-stat">
                    <div class="stat-number">0.0</div>
                    <div class="stat-label">Purata Rating</div>
                </div>
                <div class="feedback-stat">
                    <div class="stat-number">0</div>
                    <div class="stat-label">Belum Dibalas</div>
                </div>
                <div class="feedback-stat">
                    <div class="stat-number">0</div>
                    <div class="stat-label">Laporan</div>
                </div>
            </div>

            <div class="feedback-list" id="feedbackList">
                <div class="empty-state">
                    <div class="empty-icon">💬</div>
                    <p>Tiada ulasan lagi.</p>
                </div>
            </div>

        </div>

    </div>

    <script>
        function replyFeedback(id) {
            alert('Fungsi balas ulasan akan dibina di peringkat seterusnya.');
        }

        function deleteFeedback(id) {
            if (confirm('Adakah anda pasti mahu memadam ulasan ini?')) {
                alert('Ulasan akan dipadam di peringkat seterusnya.');
            }
        }

        function reportFeedback(id) {
            alert('Fungsi laporan ulasan akan dibina di peringkat seterusnya.');
        }
    </script>

</body>
</html>
