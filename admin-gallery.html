<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tok Lal Production - Admin Galeri</title>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">

    <style>
        .site-header {
            width: 100%;
            display: block;
            background: #1A1A2E;
            border-bottom: 2px solid rgba(255, 184, 48, 0.2);
        }
        .site-header img {
            width: 100%;
            height: auto;
            display: block;
        }
        .admin-page {
            min-height: 100vh;
            background: #1A1A2E;
            padding: 20px;
        }
        .admin-container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .admin-header .logo-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .admin-header .logo-area img {
            height: 40px;
            width: auto;
            filter: brightness(0) invert(1);
        }
        .admin-header .logo-area span {
            color: #FFF8F0;
            font-size: 1.2rem;
            font-weight: 700;
        }
        .admin-header .user-area {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .admin-header .user-area .user-name {
            color: #FFF8F0;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .admin-header .user-area .logout-btn {
            background: rgba(255,255,255,0.06);
            color: #FF6B6B;
            border: 1px solid rgba(255,107,107,0.15);
            padding: 8px 18px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
            text-decoration: none;
        }
        .admin-header .user-area .logout-btn:hover {
            background: rgba(255,107,107,0.1);
        }
        .admin-header .back-btn {
            color: #C4C0B8;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        .admin-header .back-btn:hover {
            color: #FFB830;
        }
        .page-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .page-title h1 {
            color: #FFF8F0;
            font-size: 1.8rem;
            font-weight: 700;
        }
        .page-title h1 span {
            color: #FFB830;
        }

        /* UPLOAD FORM */
        .upload-form {
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            padding: 30px 35px;
            border: 1px solid rgba(255,255,255,0.06);
            margin-bottom: 30px;
        }
        .upload-form h3 {
            color: #FFF8F0;
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 15px;
        }
        .upload-form h3 span {
            color: #FFB830;
        }
        .upload-form .form-group {
            margin-bottom: 15px;
        }
        .upload-form .form-group label {
            display: block;
            color: #C4C0B8;
            font-size: 0.85rem;
            font-weight: 500;
            margin-bottom: 5px;
        }
        .upload-form .form-group input[type="text"] {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 8px;
            color: #FFF8F0;
            font-size: 1rem;
            transition: border-color 0.3s;
            box-sizing: border-box;
        }
        .upload-form .form-group input[type="text"]:focus {
            outline: none;
            border-color: #FFB830;
        }
        .upload-form .file-upload-area {
            border: 2px dashed rgba(255,184,48,0.2);
            border-radius: 8px;
            padding: 30px 20px;
            text-align: center;
            color: #C4C0B8;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-form .file-upload-area:hover {
            border-color: rgba(255,184,48,0.4);
            background: rgba(255,255,255,0.02);
        }
        .upload-form .file-upload-area .upload-icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 8px;
        }
        .upload-form .file-upload-area input[type="file"] {
            display: none;
        }
        .upload-form .file-upload-area .file-count {
            color: #FFB830;
            font-weight: 600;
            margin-top: 5px;
            font-size: 0.9rem;
        }
        .upload-form .upload-actions {
            display: flex;
            gap: 12px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .upload-form .upload-actions button {
            padding: 12px 30px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .upload-form .upload-actions .upload-btn {
            background: #FFB830;
            color: #1A1A2E;
            flex: 1;
        }
        .upload-form .upload-actions .upload-btn:hover {
            background: #e8a820;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255,184,48,0.3);
        }
        .upload-form .upload-actions .clear-btn {
            background: rgba(255,107,107,0.15);
            color: #FF6B6B;
        }
        .upload-form .upload-actions .clear-btn:hover {
            background: rgba(255,107,107,0.25);
        }

        /* PREVIEW */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }
        .preview-item {
            background: rgba(255,255,255,0.04);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
            position: relative;
            transition: all 0.3s ease;
        }
        .preview-item:hover {
            border-color: rgba(255,184,48,0.3);
            transform: translateY(-4px);
        }
        .preview-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            display: block;
            background: #2A2A4A;
        }
        .preview-item .preview-filename {
            padding: 10px 12px;
            color: #C4C0B8;
            font-size: 0.75rem;
            font-weight: 300;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .preview-item .preview-remove {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255,107,107,0.85);
            color: #FFF;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .preview-item .preview-remove:hover {
            background: #FF6B6B;
            transform: scale(1.1);
        }
        .preview-empty {
            text-align: center;
            color: #4A4A6A;
            padding: 40px 20px;
        }
        .preview-empty .empty-icon {
            font-size: 2.5rem;
            margin-bottom: 8px;
        }

        /* ========================================== */
        /* GALERI CARD - DESIGN YANG ANDA MINTA     */
        /* ========================================== */

        .gallery-card {
            background: rgba(255,255,255,0.04);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.06);
            padding: 25px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }
        .gallery-card:hover {
            border-color: rgba(255,184,48,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .gallery-card .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid rgba(255,184,48,0.15);
        }
        .gallery-card .gallery-header .gallery-title {
            color: #FFF8F0;
            font-size: 1.3rem;
            font-weight: 700;
        }
        .gallery-card .gallery-header .gallery-title span {
            color: #FFB830;
        }
        .gallery-card .gallery-header .gallery-count {
            color: #4A4A6A;
            font-size: 0.85rem;
        }

        .gallery-card .gallery-images {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 15px;
        }
        .gallery-card .gallery-images .gallery-img {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.06);
            transition: all 0.3s ease;
            position: relative;
        }
        .gallery-card .gallery-images .gallery-img:hover {
            border-color: rgba(255,184,48,0.3);
            transform: scale(1.03);
        }
        .gallery-card .gallery-images .gallery-img img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
            background: #2A2A4A;
        }
        .gallery-card .gallery-images .gallery-img .img-remove {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(255,107,107,0.85);
            color: #FFF;
            border: none;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gallery-card .gallery-images .gallery-img .img-remove:hover {
            background: #FF6B6B;
            transform: scale(1.1);
        }

        .gallery-card .gallery-actions {
            display: flex;
            gap: 12px;
            padding-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.04);
            flex-wrap: wrap;
        }
        .gallery-card .gallery-actions button {
            padding: 8px 25px;
            border: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .gallery-card .gallery-actions .edit-btn {
            background: rgba(255,184,48,0.15);
            color: #FFB830;
            border: 1px solid rgba(255,184,48,0.2);
        }
        .gallery-card .gallery-actions .edit-btn:hover {
            background: rgba(255,184,48,0.25);
            transform: translateY(-2px);
        }
        .gallery-card .gallery-actions .delete-btn {
            background: rgba(255,107,107,0.15);
            color: #FF6B6B;
            border: 1px solid rgba(255,107,107,0.2);
        }
        .gallery-card .gallery-actions .delete-btn:hover {
            background: rgba(255,107,107,0.25);
            transform: translateY(-2px);
        }

        .gallery-empty-state {
            text-align: center;
            color: #4A4A6A;
            padding: 60px 20px;
        }
        .gallery-empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #1A1A2E;
            border: 1px solid rgba(255,184,48,0.3);
            border-radius: 12px;
            padding: 18px 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.4s ease;
            z-index: 9999;
            max-width: 400px;
        }
        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }
        .toast .toast-title {
            color: #4CAF50;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
        }
        .toast .toast-message {
            color: #C4C0B8;
            font-size: 0.9rem;
            font-weight: 300;
        }

        @media screen and (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                gap: 15px;
                text-align: center;
                padding: 15px 20px;
            }
            .page-title {
                flex-direction: column;
                text-align: center;
            }
            .upload-form {
                padding: 20px;
            }
            .upload-form .upload-actions {
                flex-direction: column;
            }
            .upload-form .upload-actions button {
                width: 100%;
            }
            .preview-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            }
            .gallery-card .gallery-images {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
            .gallery-card .gallery-actions {
                flex-direction: column;
            }
            .gallery-card .gallery-actions button {
                width: 100%;
            }
            .toast {
                left: 20px;
                right: 20px;
                bottom: 20px;
                max-width: none;
            }
        }
        @media screen and (max-width: 480px) {
            .preview-grid {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
            .preview-item img {
                height: 120px;
            }
            .gallery-card .gallery-images {
                grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            }
            .gallery-card .gallery-images .gallery-img img {
                height: 140px;
            }
            .gallery-card .gallery-header {
                flex-direction: column;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <header class="site-header">
        <img src="pictures/banner.png" alt="TOK LAL Production Banner">
    </header>

    <div class="admin-page">
        <div class="admin-container">

            <!-- HEADER -->
            <header class="admin-header">
                <div class="logo-area">
                    <img src="pictures/logo/toklal-logo.png" alt="Tok Lal Production" onerror="this.style.display='none'">
                    <span>Panel Admin</span>
                </div>
                <div style="display:flex; gap:15px; align-items:center; flex-wrap:wrap;">
                    <a href="admin-dashboard.html" class="back-btn">← Dashboard</a>
                    <div class="user-area">
                        <div class="user-name">🛡️ Admin</div>
                        <a href="admin-login.html" class="logout-btn">🚪 Log Keluar</a>
                    </div>
                </div>
            </header>

            <!-- PAGE TITLE -->
            <div class="page-title">
                <h1>🖼️ <span>Galeri Aktiviti</span></h1>
            </div>

            <!-- UPLOAD FORM -->
            <div class="upload-form">
                <h3>📤 <span>Upload Gambar</span></h3>

                <div class="form-group">
                    <label for="galleryTitle">Tajuk</label>
                    <input type="text" id="galleryTitle" placeholder="Contoh: Persembahan 2024, Kelas Kompang">
                </div>

                <div class="form-group">
                    <label>Pilih Gambar</label>
                    <div class="file-upload-area" onclick="document.getElementById('fileInput').click()">
                        <span class="upload-icon">📸</span>
                        <p>Klik untuk pilih gambar</p>
                        <p style="font-size:0.8rem; color:#4A4A6A;">Anda boleh pilih banyak gambar (Ctrl+Click)</p>
                        <input type="file" id="fileInput" multiple accept="image/*" onchange="handleFiles()">
                        <div class="file-count" id="fileCount">Tiada gambar dipilih</div>
                    </div>
                </div>

                <div class="upload-actions">
                    <button class="upload-btn" id="uploadBtn" onclick="uploadToSupabase()">
                        📤 Upload ke Database
                    </button>
                    <button class="clear-btn" onclick="clearAll()">🗑️ Kosongkan</button>
                </div>
            </div>

            <!-- PREVIEW -->
            <h3 style="color:#FFF8F0; margin-bottom:15px;">📋 Preview Gambar</h3>
            <div class="preview-grid" id="previewGrid">
                <div class="preview-empty">
                    <div class="empty-icon">🖼️</div>
                    <p>Tiada gambar dalam senarai preview.</p>
                </div>
            </div>

            <!-- ========================================== -->
            <!-- GALERI - DESIGN BARU                     -->
            <!-- ========================================== -->

            <h3 style="color:#FFF8F0; margin:30px 0 15px 0;">📚 Galeri Tersimpan</h3>
            <div id="galleryContainer">
                <!-- Gallery cards akan di-load oleh JavaScript -->
            </div>

        </div>
    </div>

    <!-- TOAST -->
    <div class="toast" id="toast">
        <div class="toast-title" id="toastTitle">✅ Berjaya!</div>
        <div class="toast-message" id="toastMessage">Gambar berjaya diupload.</div>
    </div>

    <script>
        // ========================================== //
        // SUPABASE CREDENTIALS                       //
        // ========================================== //

        const SUPABASE_URL = 'https://choqidxpmdwvmdnfpiox.supabase.co';
        const SUPABASE_KEY = 'YOUR_SERVICE_ROLE_KEY_HERE';  // <-- TUKAR KE SERVICE ROLE KEY

        // ========================================== //
        // STATE                                     //
        // ========================================== //

        let previewFiles = [];
        let isUploading = false;

        // ========================================== //
        // HANDLE FILES                              //
        // ========================================== //

        function handleFiles() {
            const fileInput = document.getElementById('fileInput');
            const files = fileInput.files;

            if (files.length === 0) return;

            for (let file of files) {
                const exists = previewFiles.some(f => f.name === file.name && f.size === file.size);
                if (exists) continue;

                const reader = new FileReader();
                reader.onload = function(e) {
                    previewFiles.push({
                        file: file,
                        dataUrl: e.target.result,
                        name: file.name,
                        size: file.size
                    });
                    renderPreview();
                    updateFileCount();
                };
                reader.readAsDataURL(file);
            }

            fileInput.value = '';
        }

        // ========================================== //
        // RENDER PREVIEW                             //
        // ========================================== //

        function renderPreview() {
            const grid = document.getElementById('previewGrid');

            if (previewFiles.length === 0) {
                grid.innerHTML = `
                    <div class="preview-empty">
                        <div class="empty-icon">🖼️</div>
                        <p>Tiada gambar dalam senarai preview.</p>
                    </div>
                `;
                return;
            }

            let html = '';
            previewFiles.forEach((item, index) => {
                html += `
                    <div class="preview-item">
                        <img src="${item.dataUrl}" alt="${item.name}">
                        <div class="preview-filename">${item.name}</div>
                        <button class="preview-remove" onclick="removeFile(${index})">✕</button>
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        // ========================================== //
        // REMOVE FILE                               //
        // ========================================== //

        function removeFile(index) {
            previewFiles.splice(index, 1);
            renderPreview();
            updateFileCount();
        }

        // ========================================== //
        // UPDATE FILE COUNT                         //
        // ========================================== //

        function updateFileCount() {
            const countDisplay = document.getElementById('fileCount');
            if (previewFiles.length === 0) {
                countDisplay.textContent = 'Tiada gambar dipilih';
                countDisplay.style.color = '#4A4A6A';
            } else {
                countDisplay.textContent = `${previewFiles.length} gambar dalam senarai`;
                countDisplay.style.color = '#FFB830';
            }
        }

        // ========================================== //
        // CLEAR ALL                                 //
        // ========================================== //

        function clearAll() {
            if (previewFiles.length === 0) return;
            if (!confirm('Kosongkan semua gambar dalam senarai?')) return;

            previewFiles = [];
            renderPreview();
            updateFileCount();
            document.getElementById('fileInput').value = '';
        }

        // ========================================== //
        // UPLOAD TO SUPABASE                        //
        // ========================================== //

        async function uploadToSupabase() {
            const title = document.getElementById('galleryTitle').value.trim();

            if (!title) {
                alert('⚠️ Sila masukkan tajuk.');
                return;
            }

            if (previewFiles.length === 0) {
                alert('⚠️ Tiada gambar untuk diupload.');
                return;
            }

            if (isUploading) return;

            isUploading = true;
            const btn = document.getElementById('uploadBtn');
            btn.disabled = true;
            btn.textContent = '⏳ Uploading...';

            let uploaded = 0;
            let failed = 0;

            console.log('🔍 Starting upload...');
            console.log('📁 Files:', previewFiles.length);

            for (let item of previewFiles) {
                try {
                    const timestamp = Date.now() + Math.random() * 1000;
                    const cleanName = item.name.replace(/[^a-zA-Z0-9.\-]/g, '_');
                    const filename = `${timestamp}_${cleanName}`;

                    console.log(`📤 Uploading: ${filename}`);

                    // Upload to Storage
                    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/gallery/${filename}`, {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        },
                        body: item.file
                    });

                    if (!uploadRes.ok) {
                        const errorText = await uploadRes.text();
                        console.error('❌ Storage error:', errorText);
                        throw new Error(errorText);
                    }

                    console.log('✅ Storage OK');

                    const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/gallery/${filename}`;

                    // Save to Database
                    const insertRes = await fetch(`${SUPABASE_URL}/rest/v1/gallery_images`, {
                        method: 'POST',
                        headers: {
                            'apikey': SUPABASE_KEY,
                            'Authorization': `Bearer ${SUPABASE_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=minimal'
                        },
                        body: JSON.stringify({
                            title: title,
                            image_url: publicUrl,
                            filename: item.name
                        })
                    });

                    if (!insertRes.ok) {
                        const errorText = await insertRes.text();
                        console.error('❌ DB error:', errorText);
                        throw new Error(errorText);
                    }

                    console.log('✅ DB OK');
                    uploaded++;

                } catch (error) {
                    console.error('❌ Failed:', item.name, error.message);
                    failed++;
                }
            }

            isUploading = false;
            btn.disabled = false;
            btn.textContent = '📤 Upload ke Database';

            if (uploaded > 0) {
                previewFiles = [];
                renderPreview();
                updateFileCount();
                document.getElementById('fileInput').value = '';
                document.getElementById('galleryTitle').value = '';

                loadGalleries();
                showToast(`✅ ${uploaded} gambar berjaya diupload!`, `Tajuk: "${title}"${failed > 0 ? ` (${failed} gagal)` : ''}`);
            } else {
                alert('❌ Gagal upload. Sila semak console (F12) untuk error.');
            }
        }

        // ========================================== //
        // LOAD GALLERIES - DESIGN BARU              //
        // ========================================== //

        async function loadGalleries() {
            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/gallery_images?order=created_at.desc`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                if (!res.ok) throw new Error('Failed to load');

                const data = await res.json();
                const container = document.getElementById('galleryContainer');

                if (data.length === 0) {
                    container.innerHTML = `
                        <div class="gallery-empty-state">
                            <div class="empty-icon">📭</div>
                            <p>Tiada galeri. Upload gambar untuk mula.</p>
                        </div>
                    `;
                    return;
                }

                // Group by title
                const groups = {};
                data.forEach(item => {
                    if (!groups[item.title]) groups[item.title] = [];
                    groups[item.title].push(item);
                });

                let html = '';
                for (let [title, items] of Object.entries(groups)) {
                    html += `
                        <div class="gallery-card" data-title="${title}">
                            <div class="gallery-header">
                                <div class="gallery-title">📸 <span>${title}</span></div>
                                <div class="gallery-count">${items.length} gambar</div>
                            </div>
                            <div class="gallery-images">
                                ${items.map(item => `
                                    <div class="gallery-img">
                                        <img src="${item.image_url}" alt="${item.title}" loading="lazy">
                                        <button class="img-remove" onclick="deleteImage('${item.id}')" title="Padam gambar ini">✕</button>
                                    </div>
                                `).join('')}
                            </div>
                            <div class="gallery-actions">
                                <button class="edit-btn" onclick="editGallery('${title}')">✏️ Edit Galeri</button>
                                <button class="delete-btn" onclick="deleteGallery('${title}')">🗑️ Delete Galeri</button>
                            </div>
                        </div>
                    `;
                }

                container.innerHTML = html;

            } catch (error) {
                console.error('Load error:', error);
                document.getElementById('galleryContainer').innerHTML = `
                    <div class="gallery-empty-state">
                        <div class="empty-icon">❌</div>
                        <p>Gagal memuatkan galeri.</p>
                    </div>
                `;
            }
        }

        // ========================================== //
        // DELETE SINGLE IMAGE                       //
        // ========================================== //

        async function deleteImage(id) {
            if (!confirm('Padam gambar ini?')) return;

            try {
                const getRes = await fetch(`${SUPABASE_URL}/rest/v1/gallery_images?id=eq.${id}`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                const data = await getRes.json();
                if (data.length === 0) return;

                const filename = data[0].image_url.split('/').pop();

                await fetch(`${SUPABASE_URL}/storage/v1/object/gallery/${filename}`, {
                    method: 'DELETE',
                    headers: {
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                await fetch(`${SUPABASE_URL}/rest/v1/gallery_images?id=eq.${id}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                showToast('🗑️ Dipadam', 'Gambar berjaya dipadam.');
                loadGalleries();

            } catch (error) {
                console.error('Delete error:', error);
                alert('Gagal memadam gambar.');
            }
        }

        // ========================================== //
        // DELETE ENTIRE GALLERY BY TITLE            //
        // ========================================== //

        async function deleteGallery(title) {
            if (!confirm(`❌ Padam keseluruhan galeri "${title}"?`)) return;

            try {
                // Get all images with this title
                const getRes = await fetch(`${SUPABASE_URL}/rest/v1/gallery_images?title=eq.${encodeURIComponent(title)}`, {
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                const data = await getRes.json();

                // Delete each image from storage
                for (let item of data) {
                    const filename = item.image_url.split('/').pop();
                    await fetch(`${SUPABASE_URL}/storage/v1/object/gallery/${filename}`, {
                        method: 'DELETE',
                        headers: {
                            'Authorization': `Bearer ${SUPABASE_KEY}`
                        }
                    });
                }

                // Delete all from database
                await fetch(`${SUPABASE_URL}/rest/v1/gallery_images?title=eq.${encodeURIComponent(title)}`, {
                    method: 'DELETE',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });

                showToast('🗑️ Dipadam', `Galeri "${title}" berjaya dipadam.`);
                loadGalleries();

            } catch (error) {
                console.error('Delete gallery error:', error);
                alert('Gagal memadam galeri.');
            }
        }

        // ========================================== //
        // EDIT GALLERY - Tukar Tajuk                //
        // ========================================== //

        async function editGallery(oldTitle) {
            const newTitle = prompt(`Tukar tajuk "${oldTitle}" kepada:`, oldTitle);
            if (!newTitle || newTitle === oldTitle) return;

            try {
                // Update all images with this title
                await fetch(`${SUPABASE_URL}/rest/v1/gallery_images?title=eq.${encodeURIComponent(oldTitle)}`, {
                    method: 'PATCH',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Content-Type': 'application/json',
                        'Prefer': 'return=minimal'
                    },
                    body: JSON.stringify({ title: newTitle })
                });

                showToast('✅ Berjaya!', `Tajuk ditukar kepada "${newTitle}"`);
                loadGalleries();

            } catch (error) {
                console.error('Edit error:', error);
                alert('Gagal menukar tajuk.');
            }
        }

        // ========================================== //
        // TOAST                                      //
        // ========================================== //

        function showToast(title, message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastTitle').textContent = title;
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');

            clearTimeout(window.toastTimeout);
            window.toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 5000);
        }

        // ========================================== //
        // INIT                                       //
        // ========================================== //

        document.addEventListener('DOMContentLoaded', function() {
            loadGalleries();
            console.log('%c🎵 TOK LAL PRODUCTION', 'font-size:20px; font-weight:800; color:#FFB830;');
            console.log('%c📸 Galeri Aktiviti', 'font-size:14px; color:#C4C0B8;');
        });
    </script>

</body>
</html>
